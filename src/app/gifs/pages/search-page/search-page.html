<h2 class="text-2xl font-bold mt-5">Search Page</h2>
<h3 class="text-sm font-bold mt-5">Search for a GIF</h3>

<section class="flex flex-col gap-4">
  <input type="text" 
  placeholder="Search for a GIF" 
  class="border border-gray-300 rounded-md p-2 mt-3"
  #txtSearch
  (keyup.enter)="onSearch(txtSearch.value)"
  >
</section>

<section class="py-4">
    <gif-list [gifs]="gifs()" [loading]="gifService.GifsLoading()"/>
</section>
